<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issue Tracker</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind CSS + DaisyUI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<style>
    body {
        font-family: "Geist", sans-serif;
    }
</style>

<body class="flex justify-center items-center min-h-screen bg-gray-200">
    <main>
        <form class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <div class="space-y-2 flex flex-col justify-center items-center">
                <img class="" src="./assets/github-logo.png" alt="Github-logo">
                <h3 class="text-2xl font-bold">GitHub Issues Tracker</h3>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>
            <fieldset class="fieldset">
                <label class="label text-lg text-black">Username</label>
                <input id="input-username" type="text" class="input validator" placeholder="Enter Username" required />
                <p class="validator text-primary">Default: admin</p>
            </fieldset>

            <label class="fieldset">
                <span class="label text-lg text-black">Password</span>
                <input id="input-password" type="password" class="input validator" placeholder="Enter Password" required />
                <span class="validator text-primary">Default: admin123</span>
            </label>

            <button id="signIn-btn" class="btn btn-primary text-lg mt-4" type="submit">Sign In</button>
            <div class="flex items-center my-4">
                <hr class="flex-grow border-gray-300">
                <span class="mx-4 text-gray-500 font-semibold">OR</span>
                <hr class="flex-grow border-gray-300">
            </div>
            <p class="text-center text-gray-600">Demo Credentials:</p>
            <div class="text-center bg-gray-200 p-2 rounded-md">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </form>
    </main>

    <script src="./JavaScript/login.js"></script>
</body>

</html>
